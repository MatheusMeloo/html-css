<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Identificadores</title>
  <style>
    div{
      display: inline-block;
      width: 200px;
      height: 200px;
      background-color: white;
      border: 1px solid black;
    }

    div#area01{
      background-color: #8B0000;
    }

    div#area02{
      background-color: #556B2F;
    }

    div#area03{
      background-color: #00008B;
    }

    div#area04{
      background-color: #D3D3D3;
    }

    div#area05{
      background-color: #00008B;
    }
  </style>
</head>
<body>
  <h1>Identificadores em CSS</h1>

  <P>
    No execício anterior, vimos as <mark>classes</mark> e entendemos que vários elementos pode ter uma mesma classe. Mas se quisermos <mark>identificar</mark> os elementos, dando um "nome" especifico para cada um, podemos usar os IDs. Em um mesmo documento, <strong>não podemos ter dois elementos com o mesmo ID!</strong>
  </P>

  <div id="area01"></div>
  <div id="area02"></div>
  <div id="area03"></div>
  <div id="area04"></div>
  <div id="area05"></div>
</body>
</html>
